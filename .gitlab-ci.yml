image: node:20-alpine

stages:
  - build
  - deploy

cache:
  key:
    files:
      - package.json
  paths:
    - node_modules/

build:
  stage: build
  script:
    - npm install
    - npm run build
  variables:
    VITE_BASE_PATH: "/folio/"
  artifacts:
    paths:
      - dist
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

pages:
  stage: deploy
  script:
    - cp -r dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
